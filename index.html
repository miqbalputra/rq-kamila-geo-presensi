<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1e3a8a" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Presensi RQ Kamila</title>
  </head>
  <body>
    <div id="root"></div>
    
    <!-- Fail-safe untuk menangani white screen secara instan -->
    <script>
      // 1. Tangani error fatal secara INSTAN saat pemuatan bundle
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        // Jika error terjadi sebelum root terisi, kemungkinan besar fatal boot error
        const root = document.getElementById('root');
        if (root && (root.innerHTML === '' || root.innerHTML.length < 50)) {
          console.error('Fatal boot error terdeteksi. Mengalihkan ke login...');
          clearEverythingAndGoToLogin();
        }
        return false;
      };

      // 2. Tangani error loading chunk (umum pada update PWA)
      window.addEventListener('error', function(e) {
        if (e.message && (e.message.indexOf('ChunkLoadError') > -1 || e.message.indexOf('Loading chunk') > -1)) {
          console.warn('Gagal memuat modul, mencoba memuat ulang halaman...');
          window.location.reload();
        }
      }, true);

      // 3. Fail-safe waktu (dikurangi ke 5 detik agar lebih responsif)
      setTimeout(function() {
        const root = document.getElementById('root');
        if (root && (root.innerHTML === '' || root.innerHTML.length < 50)) {
          console.error('Aplikasi gagal dimuat dalam 5 detik. Mengalihkan ke login...');
          clearEverythingAndGoToLogin();
        }
      }, 5000);

      function clearEverythingAndGoToLogin() {
        // Hapus Service Worker & Cache untuk reset state
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            for(let registration of registrations) registration.unregister();
          });
        }
        if ('caches' in window) {
          caches.keys().then(function(names) {
            for (let name of names) caches.delete(name);
          });
        }
        // Redirect ke login dengan bypass cache
        window.location.href = '/login?ref=ws_fix&t=' + Date.now();
      }
    </script>



    <script type="module" src="/src/main.jsx"></script>
  </body>

</html>
